apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-org/redis-agent-platform.git' # Replace with actual repo URL
    targetRevision: HEAD
    path: infrastructure
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: redis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
