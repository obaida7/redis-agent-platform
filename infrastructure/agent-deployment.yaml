apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-agent
  namespace: redis
  labels:
    app: redis-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: redis-agent
  template:
    metadata:
      labels:
        app: redis-agent
    spec:
      containers:
      - name: redis-agent
        image: redis-agent-platform:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: aws_region
          value: "us-east-1"
        # We fetch the redis_password directly from the secret
        - name: redis_password
          valueFrom:
            secretKeyRef:
              name: redb-prod-db
              key: password
        - name: redis_port
          value: "19999"
        - name: redis_host
          value: "prod-db.redis.svc.cluster.local"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-agent-service
  namespace: redis
spec:
  selector:
    app: redis-agent
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
